{% if page and page.meta and page.meta.comments == false %}
{% else %}
  <h2 id="__comments">评论</h2>
  <p class="dn-muted" style="color: var(--dn-muted); font-size: 0.92rem;">
    使用 GitHub 账号登录后即可留言。作者可在 Discussions 中审核与回复。
  </p>
  <div class="dn-comments">
    <script
      src="https://giscus.app/client.js"
      data-repo="duniang818/wahaha"
      data-repo-id="R_kgDORLy0LA"
      data-category="Announcements"
      data-category-id="DIC_KWDORplaceholder"
      data-mapping="pathname"
      data-strict="0"
      data-reactions-enabled="1"
      data-emit-metadata="0"
      data-input-position="top"
      data-theme="preferred_color_scheme"
      data-lang="zh-CN"
      data-loading="lazy"
      crossorigin="anonymous"
      async
    ></script>
  </div>
  <noscript>请启用 JavaScript 以查看评论。若评论区空白，请先在仓库启用 Discussions 并配置 Giscus。</noscript>
{% endif %}
